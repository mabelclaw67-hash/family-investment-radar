[build]
  publish = "."
  command = ""   # Static site — no build step needed

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[build.environment]
  # Set this in Netlify UI → Site Settings → Environment Variables
  # VITE_FAMILY_INVESTMENT_SITE_PASSWORD = "your-real-password"
  # Do NOT commit the real password here.
  VITE_FAMILY_INVESTMENT_SITE_PASSWORD = "CHANGE_ME_BEFORE_DEPLOY"
